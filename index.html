<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>Product Store</title>
  <meta name="title" content="Product Store" />
  <meta name="description"
    content="Welcome to Product Store. Explore our curated collection of premium Apple products, including AirPods Max, MacBook Pro, and more." />
  <meta name="keywords"
    content="Product Store, Apple, AirPods Max, MacBook Pro, Premium Electronics, High-fidelity audio" />
  <meta name="author" content="Product Store" />
  <meta name="robots" content="index, follow" />

  <!-- Canonical Link -->
  <link rel="canonical" href="https://product-store-3d.onrender.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Product Store" />
  <meta property="og:url" content="https://product-store-3d.onrender.com/" />
  <meta property="og:title" content="Product Store" />
  <meta property="og:description"
    content="Explore our curated collection of premium Apple products. Experience excellence in design and audio at Product Store." />
  <meta property="og:image" content="/landing_page_preview.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://product-store-3d.onrender.com/" />
  <meta property="twitter:title" content="Product Store" />
  <meta property="twitter:description"
    content="Explore our curated collection of premium Apple products. Experience excellence in design and audio at Product Store." />
  <meta property="twitter:image" content="/landing_page_preview.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Product Store",
        "url": "https://product-store-3d.onrender.com/",
        "logo": "https://product-store-3d.onrender.com/vite.svg",
        "sameAs": [
          "https://twitter.com/productstore",
          "https://facebook.com/productstore"
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://product-store-3d.onrender.com/"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "MacBook",
            "item": "https://product-store-3d.onrender.com/macbook"
          }
        ]
      },
      {
        "@context": "https://schema.org/",
        "@type": "Product",
        "name": "AirPods Max",
        "brand": { "@type": "Brand", "name": "Apple" },
        "description": "High-fidelity audio. Active Noise Cancellation with Transparency mode.",
        "offers": {
          "@type": "Offer",
          "url": "https://product-store-3d.onrender.com/",
          "priceCurrency": "USD",
          "price": "549.00",
          "availability": "https://schema.org/InStock"
        }
      },
      {
        "@context": "https://schema.org/",
        "@type": "Product",
        "name": "MacBook Pro",
        "brand": { "@type": "Brand", "name": "Apple" },
        "description": "A monster for any task. Up to 24 hours of battery life.",
        "offers": {
          "@type": "Offer",
          "url": "https://product-store-3d.onrender.com/macbook",
          "priceCurrency": "USD",
          "price": "1599.00",
          "availability": "https://schema.org/InStock"
        }
      }
    ]
  </script>
</head>

<body class="bg-black text-apple-silver font-['Outfit'] antialiased overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
